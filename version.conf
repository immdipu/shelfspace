# ShelfSpace Version Configuration
# This file is sourced by build scripts to maintain consistent versioning

# App Information
APP_NAME="ShelfSpace"
APP_VERSION="1.0.0"
BUNDLE_ID="com.dipuchaurasiya.shelfspace"
DEVELOPER_NAME="Dipu"

# Build Configuration
MIN_MACOS_VERSION="13.0"
COPYRIGHT_YEAR=$(date +%Y)

# URLs
GITHUB_URL="https://github.com/immdipu"
SUPPORT_URL="https://github.com/immdipu/shelfspace"

# Build settings
MAX_FILE_SIZE_MB=200
MAX_ITEMS=200

# Release notes for current version
RELEASE_NOTES="ShelfSpace v${APP_VERSION} — Your clipboard, elevated.

A native macOS menu bar clipboard manager built with Swift.

Features:
• Smart clipboard monitoring — auto-captures images, text, and files
• Drag & drop — drop files in, drag items out to any app
• Grid & list views with 3 density levels (compact, comfortable, large)
• Content filtering — All, Pinned, Images, Text, Files tabs with live counts
• Pin important items — protected from auto-cleanup, persisted across restarts
• Rich previews — image thumbnails, text rendering, file type icons
• Quick actions on hover — copy, pin, delete with satisfying animations
• Persistent storage — items saved automatically, survive restarts
• Deeply customizable — polling interval, file size limits, capture toggles, density, thumbnail style, corner radius, auto-clear retention
• Native performance — built with Swift & AppKit, minimal memory footprint
• Launch at login support
• Bulk management — clear all, clear unpinned, auto-clear by retention days

System Requirements:
- macOS 13.0 (Ventura) or later
- Intel or Apple Silicon Mac"
